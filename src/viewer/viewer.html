<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src {{cspSource}}; style-src {{cspSource}} 'unsafe-inline'; img-src {{cspSource}} data:; connect-src {{cspSource}}; worker-src {{cspSource}} blob:; font-src {{cspSource}};">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>PDF Preview</title>
	<link rel="stylesheet" href="{{codiconsUri}}">
	<script type="module" src="{{toolkitUri}}"></script>
	<style>
		body {
			margin: 0;
			padding: 0;
			overflow: hidden;
			background-color: #525252;
		}
		#pdf-container {
			width: 100%;
			height: calc(100vh - 35px);
			margin-top: 35px;
			overflow: auto;
			display: flex;
			flex-direction: column;
			align-items: center;
			padding: 20px;
			box-sizing: border-box;
		}
		.pdf-page {
			margin-bottom: 20px;
			box-shadow: 0 2px 8px rgba(0,0,0,0.5);
			position: relative;
		}
		canvas {
			display: block;
		}
		.page-links {
			position: absolute;
			top: 0;
			left: 0;
			pointer-events: none;
		}
		.page-links a {
			position: absolute;
			pointer-events: auto;
			cursor: pointer;
			border: 1px solid transparent;
		}
		.page-links a:hover {
			background-color: rgba(255, 255, 0, 0.2);
			border-color: rgba(255, 255, 0, 0.5);
		}
		.highlight {
			position: absolute;
			background-color: rgba(255, 255, 0, 0.3);
			border: 2px solid rgba(255, 200, 0, 0.8);
			pointer-events: none;
			transition: opacity 0.3s;
			z-index: 10;
		}
		#loading {
			color: white;
			text-align: center;
			padding: 50px;
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
		}
		#zoom-controls {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			background-color: var(--vscode-editorGroupHeader-tabsBackground);
			border-bottom: 1px solid var(--vscode-editorGroup-border);
			padding: 4px 8px;
			display: flex;
			gap: 4px;
			align-items: center;
			z-index: 1000;
			height: 35px;
			box-sizing: border-box;
		}
		#zoom-controls vscode-button {
			height: 22px;
		}
		#zoom-controls vscode-button.icon-only {
			padding: 0;
			width: 22px;
		}
		#zoom-level {
			color: var(--vscode-foreground);
			font-size: 12px;
			min-width: 50px;
			text-align: center;
			padding: 0 8px;
		}
		#zoom-level.fit-mode {
			opacity: 0.6;
		}
		.zoom-separator {
			width: 1px;
			height: 16px;
			background-color: var(--vscode-editorGroup-border);
			margin: 0 4px;
		}
	</style>
</head>
<body>
	<div id="zoom-controls">
		<vscode-button id="zoom-out" appearance="icon" aria-label="Zoom Out (Ctrl+-)" title="Zoom Out (Ctrl+-)">
			<span class="codicon codicon-zoom-out"></span>
		</vscode-button>
		<span id="zoom-level">100%</span>
		<vscode-button id="zoom-in" appearance="icon" aria-label="Zoom In (Ctrl++)" title="Zoom In (Ctrl++)">
			<span class="codicon codicon-zoom-in"></span>
		</vscode-button>
		<div class="zoom-separator"></div>
		<vscode-button id="zoom-fit-width" appearance="secondary" title="Fit Width (Ctrl+0)">Fit Width</vscode-button>
		<vscode-button id="zoom-fit-page" appearance="secondary" title="Fit Page (Ctrl+1)">Fit Page</vscode-button>
		<vscode-button id="zoom-100" appearance="secondary" title="100% (Ctrl+2)">100%</vscode-button>
	</div>
	<div id="loading">Loading PDF...</div>
	<div id="pdf-container"></div>
	<div id="viewer-config" data-config="{{viewerConfig}}" style="display: none;"></div>

	<script type="module" src="{{viewerScriptUri}}"></script>
</body>
</html>
