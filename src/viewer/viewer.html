<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src {{cspSource}}; style-src {{cspSource}} 'unsafe-inline'; img-src {{cspSource}} data:; connect-src {{cspSource}}; worker-src {{cspSource}} blob:;">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>PDF Preview</title>
	<style>
		body {
			margin: 0;
			padding: 0;
			overflow: hidden;
			background-color: #525252;
		}
		#pdf-container {
			width: 100%;
			height: calc(100vh - 35px);
			margin-top: 35px;
			overflow: auto;
			display: flex;
			flex-direction: column;
			align-items: center;
			padding: 20px;
			box-sizing: border-box;
		}
		.pdf-page {
			margin-bottom: 20px;
			box-shadow: 0 2px 8px rgba(0,0,0,0.5);
			position: relative;
		}
		canvas {
			display: block;
		}
		.page-links {
			position: absolute;
			top: 0;
			left: 0;
			pointer-events: none;
		}
		.page-links a {
			position: absolute;
			pointer-events: auto;
			cursor: pointer;
			border: 1px solid transparent;
		}
		.page-links a:hover {
			background-color: rgba(255, 255, 0, 0.2);
			border-color: rgba(255, 255, 0, 0.5);
		}
		.highlight {
			position: absolute;
			background-color: rgba(255, 255, 0, 0.3);
			border: 2px solid rgba(255, 200, 0, 0.8);
			pointer-events: none;
			transition: opacity 0.3s;
			z-index: 10;
		}
		#loading {
			color: white;
			text-align: center;
			padding: 50px;
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
		}
		#zoom-controls {
			position: fixed;
			top: 0;
			left: 0;
			right: 0;
			background-color: #2d2d30;
			border-bottom: 1px solid #3e3e42;
			padding: 8px 12px;
			display: flex;
			gap: 8px;
			align-items: center;
			z-index: 1000;
			height: 35px;
			box-sizing: border-box;
		}
		#zoom-controls button {
			background-color: #3c3c3c;
			color: #cccccc;
			border: 1px solid #3e3e42;
			border-radius: 2px;
			padding: 4px 12px;
			cursor: pointer;
			font-size: 13px;
			transition: background-color 0.1s;
			height: 24px;
			line-height: 1;
		}
		#zoom-controls button:hover {
			background-color: #505050;
			border-color: #555;
		}
		#zoom-controls button:active {
			background-color: #2c2c2c;
		}
		#zoom-controls button.active {
			background-color: #094771;
			border-color: #007acc;
			color: #ffffff;
		}
		#zoom-level {
			color: #cccccc;
			font-size: 12px;
			min-width: 60px;
			text-align: center;
			padding: 0 8px;
		}
		.zoom-separator {
			width: 1px;
			height: 20px;
			background-color: #3e3e42;
			margin: 0 4px;
		}
	</style>
</head>
<body>
	<div id="zoom-controls">
		<button id="zoom-out" title="Zoom Out (Ctrl+-)">−</button>
		<button id="zoom-in" title="Zoom In (Ctrl++)">+</button>
		<span id="zoom-level">100%</span>
		<div class="zoom-separator"></div>
		<button id="zoom-fit-width" title="Fit Width (Ctrl+0)">Fit Width</button>
		<button id="zoom-fit-page" title="Fit Page (Ctrl+1)">Fit Page</button>
		<button id="zoom-100" title="100% (Ctrl+2)">100%</button>
	</div>
	<div id="loading">Loading PDF...</div>
	<div id="pdf-container"></div>
	<div id="viewer-config" data-config="{{viewerConfig}}" style="display: none;"></div>

	<script type="module" src="{{viewerScriptUri}}"></script>
</body>
</html>
